<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="يومي">
<meta name="theme-color" content="#0f1117">
<title>💪 يومي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script>
(function(){
  const c=document.createElement('canvas');c.width=c.height=512;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,512,512);
  g.addColorStop(0,'#1e2333');g.addColorStop(1,'#0f1117');
  x.fillStyle=g;x.beginPath();x.roundRect(0,0,512,512,80);x.fill();
  x.strokeStyle='#f5a623';x.lineWidth=20;
  x.beginPath();x.arc(256,230,130,0,Math.PI*2);x.stroke();
  x.fillStyle='#f5a623';x.font='bold 130px serif';
  x.textAlign='center';x.textBaseline='middle';x.fillText('💪',256,230);
  x.fillStyle='#e8ecf4';x.font='bold 72px Cairo,sans-serif';
  x.fillText('يومي',256,390);
  const lnk=document.createElement('link');
  lnk.rel='apple-touch-icon';lnk.href=c.toDataURL();
  document.head.appendChild(lnk);
  const m={name:'يومي – متابعة يومية',short_name:'يومي',start_url:'.',
    display:'standalone',background_color:'#0f1117',theme_color:'#f5a623',
    lang:'ar',dir:'rtl',orientation:'portrait',
    icons:[{src:c.toDataURL(),sizes:'512x512',type:'image/png'}]};
  const bl=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
  const ml=document.createElement('link');ml.rel='manifest';
  ml.href=URL.createObjectURL(bl);document.head.appendChild(ml);
})();
</script>
<style>
:root{
  --bg:#0f1117; --s1:#161b28; --s2:#1d2336; --bd:#252d42;
  --gold:#f5a623; --green:#56c596; --blue:#5b9cf6;
  --red:#ff6b6b; --purple:#b084f5; --teal:#4ecdc4;
  --tx:#e8ecf4; --mt:#7b8799;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Cairo',sans-serif;font-size:15px;overscroll-behavior:none;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.topbar{
  background:linear-gradient(180deg,#1a2038,var(--bg));
  padding:calc(var(--safe-top) + 12px) 16px 10px;
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.topbar-title{font-size:1.05rem;font-weight:900;color:var(--gold);}
.topbar-date{font-size:.72rem;color:var(--mt);margin-top:1px;}
.save-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--safe-bot) + 80px);}

/* ── BOTTOM NAV ── */
.nav{
  background:var(--s1);border-top:1px solid var(--bd);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding-bottom:calc(var(--safe-bot) + 4px);
  position:sticky;bottom:0;z-index:100;
}
.nav-btn{
  background:none;border:none;color:var(--mt);
  font-family:'Cairo',sans-serif;font-size:.6rem;font-weight:700;
  padding:8px 4px 6px;display:flex;flex-direction:column;
  align-items:center;gap:3px;cursor:pointer;transition:.15s;
}
.nav-btn .ico{font-size:1.3rem;line-height:1;}
.nav-btn.active{color:var(--gold);}
.nav-btn.active .ico{filter:drop-shadow(0 0 6px rgba(245,166,35,.6));}

/* ── PANELS ── */
.panel{display:none;}
.panel.active{display:block;animation:fi .18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ── */
.card{background:var(--s2);border:1px solid var(--bd);border-radius:16px;padding:15px;margin-bottom:12px;}
.ct{font-size:.8rem;font-weight:900;color:var(--gold);margin-bottom:11px;display:flex;align-items:center;gap:6px;}

/* ── TODAY HERO ── */
.hero{background:linear-gradient(135deg,rgba(245,166,35,.1),rgba(86,197,150,.05));
  border:1px solid rgba(245,166,35,.2);border-radius:18px;padding:16px;margin-bottom:14px;text-align:center;}
.hero-weight{font-size:3rem;font-weight:900;color:var(--gold);line-height:1;}
.hero-sub{font-size:.72rem;color:var(--mt);margin-top:4px;}
.hero-row{display:flex;justify-content:center;gap:20px;margin-top:12px;}
.hero-stat{text-align:center;}
.hero-stat .v{font-size:1.3rem;font-weight:900;}
.hero-stat .l{font-size:.62rem;color:var(--mt);}

/* ── DAY TYPE TOGGLE ── */
.dtype{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.dtype-btn{
  background:var(--s2);border:2px solid var(--bd);border-radius:12px;
  font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:700;
  color:var(--mt);padding:10px;cursor:pointer;transition:.2s;text-align:center;
}
.dtype-btn.active-train{background:rgba(245,166,35,.12);border-color:var(--gold);color:var(--gold);}
.dtype-btn.active-rest{background:rgba(91,156,246,.12);border-color:var(--blue);color:var(--blue);}

/* ── CHECKLIST ── */
.chk-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 13px;border:1px solid var(--bd);border-radius:12px;
  margin-bottom:7px;cursor:pointer;transition:.15s;
  background:rgba(255,255,255,.015);
}
.chk-item:active{transform:scale(.98);}
.chk-item.done{background:rgba(86,197,150,.08);border-color:rgba(86,197,150,.3);}
.chk-item.done .chk-txt{text-decoration:line-through;opacity:.5;}
.chk-left{display:flex;align-items:center;gap:10px;}
.chk-icon{font-size:1.2rem;width:28px;text-align:center;}
.chk-txt{font-size:.88rem;font-weight:600;}
.chk-box{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--bd);
  background:var(--s1);display:flex;align-items:center;justify-content:center;
  font-size:.75rem;flex-shrink:0;transition:.2s;
}
.chk-item.done .chk-box{background:var(--green);border-color:var(--green);}

/* ── WATER ── */
.water-cups{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:10px 0;}
.cup{
  aspect-ratio:1;background:var(--s1);border:2px solid var(--bd);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;cursor:pointer;transition:.15s;user-select:none;
}
.cup:active{transform:scale(.9);}
.cup.on{background:rgba(91,156,246,.18);border-color:var(--blue);}
.water-info{display:flex;justify-content:space-between;font-size:.72rem;color:var(--mt);}

/* ── PROGRESS BAR ── */
.pb-wrap{margin:8px 0 4px;}
.pb{background:var(--s1);border-radius:8px;height:8px;overflow:hidden;}
.pb-f{height:100%;border-radius:8px;transition:width .35s;}
.pb-info{display:flex;justify-content:space-between;font-size:.68rem;color:var(--mt);margin-top:3px;}

/* ── CALORIE INPUT ── */
.cal-input-wrap{display:flex;gap:8px;align-items:center;margin-top:10px;}
.cal-input-wrap input{
  flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  color:var(--tx);font-family:'Cairo',sans-serif;font-size:.9rem;
  padding:9px 12px;outline:none;
}
.cal-input-wrap input:focus{border-color:var(--gold);}
.btn-save{
  background:var(--gold);border:none;border-radius:10px;
  color:#000;font-family:'Cairo',sans-serif;font-weight:900;
  font-size:.82rem;padding:9px 16px;cursor:pointer;
}

/* ── WINDOW TIMER ── */
.timer-card{
  background:linear-gradient(135deg,rgba(78,205,196,.1),rgba(86,197,150,.05));
  border:1px solid rgba(78,205,196,.25);border-radius:14px;
  padding:13px;text-align:center;margin-bottom:12px;
}
.timer-time{font-size:1.6rem;font-weight:900;color:var(--teal);}
.timer-label{font-size:.72rem;color:var(--mt);margin-top:3px;}

/* ── HISTORY ── */
.hist-item{
  background:var(--s2);border:1px solid var(--bd);border-radius:13px;
  padding:13px;margin-bottom:9px;cursor:pointer;transition:.15s;
}
.hist-item:active{transform:scale(.99);}
.hist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hist-date{font-size:.82rem;font-weight:700;}
.hist-type{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:700;}
.hist-type.t{background:rgba(245,166,35,.12);color:var(--gold);}
.hist-type.r{background:rgba(91,156,246,.12);color:var(--blue);}
.hist-dots{display:flex;gap:4px;flex-wrap:wrap;}
.hdot{width:10px;height:10px;border-radius:3px;}
.hdot.on{background:var(--green);}
.hdot.off{background:var(--bd);}
.hist-stats{display:flex;gap:12px;margin-top:8px;font-size:.72rem;color:var(--mt);}

/* ── WEIGHT LOG ── */
.wl-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;border:1px solid var(--bd);border-radius:11px;margin-bottom:7px;
}
.wl-date{font-size:.8rem;font-weight:700;}
.wl-val{font-size:1.1rem;font-weight:900;color:var(--gold);}
.wl-diff{font-size:.7rem;font-weight:700;margin-top:1px;}
.wl-diff.down{color:var(--green);}
.wl-diff.up{color:var(--red);}
.wl-diff.same{color:var(--mt);}

/* ── MEASURES ── */
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mfield label{font-size:.72rem;color:var(--mt);font-weight:700;margin-bottom:4px;display:block;}
.mfield input{
  width:100%;background:var(--s1);border:1px solid var(--bd);
  border-radius:9px;color:var(--tx);font-family:'Cairo',sans-serif;
  font-size:.88rem;padding:8px 10px;outline:none;
}
.mfield input:focus{border-color:var(--gold);}

/* ── WORKOUT LOG ── */
.ex-day{margin-bottom:14px;}
.ex-day-title{font-size:.82rem;font-weight:900;color:var(--teal);margin-bottom:8px;
  padding:6px 10px;background:rgba(78,205,196,.06);border-radius:8px;}
.ex-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);}
.ex-row:last-child{border-bottom:none;}
.ex-sets{font-size:.68rem;color:var(--gold);font-weight:700;min-width:36px;}
.ex-name{flex:1;font-size:.78rem;}
.ex-kg{
  width:58px;background:var(--s1);border:1px solid var(--bd);
  border-radius:7px;color:var(--tx);font-family:'Cairo',sans-serif;
  font-size:.75rem;padding:4px 6px;text-align:center;outline:none;
}
.ex-kg:focus{border-color:var(--gold);}
.ex-prev{font-size:.62rem;color:var(--mt);min-width:28px;text-align:center;}

/* ── SECTION HEADER ── */
.sec-h{font-size:.78rem;font-weight:900;color:var(--mt);
  text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px;}

/* ── STREAK ── */
.streak-box{
  background:linear-gradient(135deg,rgba(245,166,35,.15),rgba(176,132,245,.08));
  border:1px solid rgba(245,166,35,.25);border-radius:14px;
  padding:14px;text-align:center;margin-bottom:12px;
}
.streak-num{font-size:2.5rem;font-weight:900;color:var(--gold);}
.streak-label{font-size:.72rem;color:var(--mt);}

/* ── ALERTS ── */
.al{padding:10px 12px;border-radius:10px;font-size:.78rem;margin-bottom:10px;display:flex;gap:8px;}
.al-i{background:rgba(91,156,246,.07);border-right:3px solid var(--blue);}
.al-s{background:rgba(86,197,150,.07);border-right:3px solid var(--green);}
.al-w{background:rgba(245,166,35,.07);border-right:3px solid var(--gold);}

/* ── BTN ── */
.btn{border:none;border-radius:11px;font-family:'Cairo',sans-serif;
  font-weight:700;padding:10px 20px;cursor:pointer;font-size:.85rem;
  width:100%;margin-top:8px;transition:.15s;}
.btn:active{transform:scale(.97);}
.btn-g{background:var(--green);color:#000;}
.btn-a{background:var(--gold);color:#000;}
.btn-del{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2);color:var(--red);}

/* ── MISC ── */
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.65rem;font-weight:700;}
.bg{background:rgba(86,197,150,.12);color:var(--green);}
.ba{background:rgba(245,166,35,.12);color:var(--gold);}
.bb{background:rgba(91,156,246,.12);color:var(--blue);}
.empty{text-align:center;color:var(--mt);font-size:.82rem;padding:30px 0;}
.muted{color:var(--mt);} .sm{font-size:.78rem;} .bold{font-weight:700;}
input[type=number]::-webkit-inner-spin-button{opacity:.4;}
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <div class="topbar-title">💪 يومي</div>
      <div class="topbar-date" id="topDate"></div>
    </div>
    <div class="save-dot" id="saveDot" title="حفظ تلقائي"></div>
  </div>

  <!-- PANELS -->
  <div class="scroll" id="scroll">
    <div id="p-today"  class="panel active"></div>
    <div id="p-hist"   class="panel"></div>
    <div id="p-weight" class="panel"></div>
    <div id="p-workout"class="panel"></div>
    <div id="p-measure"class="panel"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nav-btn active" data-p="today"  onclick="go('today')">
      <span class="ico">📅</span>اليوم
    </button>
    <button class="nav-btn" data-p="hist"   onclick="go('hist')">
      <span class="ico">📊</span>السجل
    </button>
    <button class="nav-btn" data-p="weight" onclick="go('weight')">
      <span class="ico">⚖️</span>الوزن
    </button>
    <button class="nav-btn" data-p="workout" onclick="go('workout')">
      <span class="ico">🏋️</span>التمرين
    </button>
    <button class="nav-btn" data-p="measure" onclick="go('measure')">
      <span class="ico">📏</span>المقاسات
    </button>
  </nav>

</div>

<script>
// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════

const SK = 'yawmi_v1';
const GOAL_DATE = '2026-09-23';
const START_WEIGHT = 121;
const GOAL_WEIGHT  = 100;

const CHECKS = [
  {k:'win',  icon:'⏰', label:'نافذة 12م–8م'},
  {k:'bkf',  icon:'☀️', label:'الفطار'},
  {k:'snk',  icon:'🍎', label:'السناك'},
  {k:'lun',  icon:'🍗', label:'الغداء'},
  {k:'din',  icon:'🐟', label:'العشاء'},
  {k:'wrk',  icon:'🏋️', label:'التمرين'},
  {k:'wtr',  icon:'💧', label:'3 لتر ماء'},
  {k:'slp',  icon:'😴', label:'8 ساعات نوم'},
];

const EX_PLAN = {
  mon:{label:'💪 الاثنين — أوزان',items:[
    {s:'3×12',n:'Leg Press'},{s:'3×15',n:'Leg Curl'},
    {s:'3×12',n:'Chest Press'},{s:'3×12',n:'Seated Row'},
    {s:'3×15',n:'Shoulder Press'},{s:'20دق',n:'كارديو'},
  ]},
  wed:{label:'💪 الأربعاء — أوزان',items:[
    {s:'3×12',n:'Lat Pulldown'},{s:'3×12',n:'Cable Row'},
    {s:'3×15',n:'Dumbbell Curl'},{s:'3×15',n:'Tricep Pushdown'},
    {s:'3×12',n:'Hip Abductor'},{s:'25دق',n:'كارديو'},
  ]},
  fri:{label:'💪 الجمعة — أوزان',items:[
    {s:'3×12',n:'Incline Chest Press'},{s:'3×12',n:'Smith Squat'},
    {s:'3×15',n:'Calf Raise'},{s:'3×12',n:'Face Pulls'},
    {s:'3×15',n:'Plank'},{s:'25دق',n:'كارديو'},
  ]},
  tue:{label:'🚶 الثلاثاء — كارديو',items:[
    {s:'45دق',n:'مشي سريع / تريدميل'},{s:'10دق',n:'إطالة وتبريد'},
  ]},
  sat:{label:'🚶 السبت — نشاط خفيف',items:[
    {s:'40دق',n:'مشي طبيعي'},
  ]},
};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════

function getState(){
  try{ return JSON.parse(localStorage.getItem(SK)) || {}; }
  catch{ return {}; }
}
function setState(s){
  localStorage.setItem(SK, JSON.stringify(s));
  flashSave();
}
function flashSave(){
  const d=document.getElementById('saveDot');
  if(!d)return;
  d.style.background='var(--gold)';
  clearTimeout(flashSave._t);
  flashSave._t=setTimeout(()=>d.style.background='var(--green)',800);
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════

function todayKey(){
  return new Date().toISOString().split('T')[0];
}
function fmtDate(iso){
  if(!iso) return '';
  return new Date(iso+'T12:00:00').toLocaleDateString('ar-EG',
    {weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function fmtDateShort(iso){
  if(!iso) return '';
  return new Date(iso+'T12:00:00').toLocaleDateString('ar-EG',
    {month:'short',day:'numeric'});
}
function getDayType(){
  const d=new Date().getDay();
  return [1,3,5].includes(d)?'train':'rest';
}
function getTargets(type){
  return type==='train'
    ?{cal:2000,pro:135,carb:215,fat:65}
    :{cal:1700,pro:135,carb:155,fat:60};
}
function ensureDay(s,k){
  if(!s.days) s.days={};
  if(!s.days[k]) s.days[k]={
    type: getDayType(),
    cal:0, water:0,
    checks: Object.fromEntries(CHECKS.map(c=>[c.k,false]))
  };
  return s.days[k];
}

// Countdown
function getCountdown(){
  const t=new Date(GOAL_DATE+'T00:00:00'),n=new Date(),d=t-n;
  if(d<=0) return '🎉 وصلت للهدف!';
  const days=Math.floor(d/86400000);
  const hrs=Math.floor((d%86400000)/3600000);
  const min=Math.floor((d%3600000)/60000);
  return `⏳ ${days} يوم ${hrs} س ${String(min).padStart(2,'0')} د`;
}

// Window timer
function getWindowInfo(){
  const n=new Date();
  const open=new Date(); open.setHours(12,0,0,0);
  const close=new Date(); close.setHours(20,0,0,0);
  if(n<open){
    const df=open-n,h=Math.floor(df/3600000),m=Math.floor((df%3600000)/60000);
    return {status:'closed-am',text:`تفتح بعد ${h}س ${String(m).padStart(2,'0')}د`,color:'var(--mt)'};
  } else if(n<close){
    const df=close-n,h=Math.floor(df/3600000),m=Math.floor((df%3600000)/60000);
    return {status:'open',text:`مفتوحة — تُغلق بعد ${h}س ${String(m).padStart(2,'0')}د`,color:'var(--teal)'};
  } else {
    return {status:'closed-pm',text:'مغلقة — أحسنت اليوم 🌙',color:'var(--red)'};
  }
}

// Streak
function calcStreak(days){
  if(!days) return 0;
  let streak=0;
  const d=new Date();
  while(true){
    const k=d.toISOString().split('T')[0];
    const day=days[k];
    if(!day) break;
    const done=Object.values(day.checks||{}).filter(Boolean).length;
    if(done<4) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════

let currentPanel='today';
function go(p){
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.p===p));
  document.getElementById('p-'+p).classList.add('active');
  document.getElementById('scroll').scrollTop=0;
  currentPanel=p;
  render();
}

// ═══════════════════════════════════════════
//  RENDER: TODAY
// ═══════════════════════════════════════════

function renderToday(){
  const s=getState();
  const k=todayKey();
  const day=ensureDay(s,k);
  const tgt=getTargets(day.type);
  const win=getWindowInfo();
  const done=Object.values(day.checks).filter(Boolean).length;
  const total=CHECKS.length;
  const calPct=Math.min(day.cal/tgt.cal*100,100);
  const wPct=Math.min(day.water/12*100,100);

  // Latest weight from log
  const weights=s.weights||{};
  const wDates=Object.keys(weights).sort();
  const latestW=wDates.length?weights[wDates[wDates.length-1]]:START_WEIGHT;
  const lost=(START_WEIGHT-latestW).toFixed(1);

  const streak=calcStreak(s.days);

  document.getElementById('p-today').innerHTML = `
    <!-- Hero -->
    <div class="hero">
      <div class="hero-weight">${latestW}<span style="font-size:1.2rem;color:var(--mt);"> كجم</span></div>
      <div class="hero-sub">آخر وزن مسجّل</div>
      <div class="hero-row">
        <div class="hero-stat"><div class="v" style="color:var(--green);">${lost}</div><div class="l">كجم خسرت</div></div>
        <div class="hero-stat"><div class="v" style="color:var(--blue);">${(latestW-GOAL_WEIGHT).toFixed(1)}</div><div class="l">للهدف</div></div>
        <div class="hero-stat"><div class="v" style="color:var(--purple);">${streak}</div><div class="l">يوم متواصل</div></div>
      </div>
    </div>

    <!-- Countdown -->
    <div style="text-align:center;font-size:.75rem;color:var(--teal);font-weight:700;margin-bottom:12px;padding:8px;background:rgba(78,205,196,.06);border-radius:10px;">
      🎯 23 سبتمبر 2026 — ${getCountdown()}
    </div>

    <!-- Day type -->
    <div class="dtype">
      <button class="dtype-btn ${day.type==='train'?'active-train':''}" onclick="setType('train')">🏋️ تمرين<br><span style="font-size:.65rem;">${tgt.cal} kcal</span></button>
      <button class="dtype-btn ${day.type==='rest'?'active-rest':''}" onclick="setType('rest')">😴 راحة<br><span style="font-size:.65rem;">${getTargets('rest').cal} kcal</span></button>
    </div>

    <!-- Window timer -->
    <div class="timer-card">
      <div class="timer-time" style="color:${win.color};">${win.text}</div>
      <div class="timer-label">🪟 نافذة الأكل 12م – 8م</div>
    </div>

    <!-- Checklist -->
    <div class="card">
      <div class="ct">✅ Checklist اليوم
        <span class="badge ${done===total?'ba':done>=4?'bg':'bb'}" style="margin-right:auto;">${done}/${total}</span>
      </div>
      <div class="pb-wrap"><div class="pb"><div class="pb-f" style="width:${done/total*100}%;background:${done===total?'var(--gold)':'var(--green)'};"></div></div></div>
      <div style="margin-top:10px;">
        ${CHECKS.map(c=>`
          <div class="chk-item ${day.checks[c.k]?'done':''}" onclick="toggleCheck('${c.k}')">
            <div class="chk-left">
              <span class="chk-icon">${c.icon}</span>
              <span class="chk-txt">${c.label}</span>
            </div>
            <div class="chk-box">${day.checks[c.k]?'✓':''}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Water -->
    <div class="card">
      <div class="ct">💧 الماء اليوم
        <span style="margin-right:auto;font-size:.78rem;color:var(--blue);font-weight:700;">${day.water} / 12 كوب</span>
      </div>
      <div class="water-cups" id="cupsGrid">
        ${Array.from({length:12},(_,i)=>`
          <div class="cup ${i<day.water?'on':''}" onclick="setCup(${i+1})">💧</div>
        `).join('')}
      </div>
      <div class="pb-wrap"><div class="pb"><div class="pb-f" style="width:${wPct}%;background:var(--blue);"></div></div>
      <div class="pb-info"><span>الهدف 3 لتر</span><span>${day.water<12?`باقي ${12-day.water} كوب`:'✅ خلصت!'}</span></div></div>
    </div>

    <!-- Calories -->
    <div class="card">
      <div class="ct">🔥 السعرات اليوم</div>
      <div style="text-align:center;margin-bottom:10px;">
        <span style="font-size:2rem;font-weight:900;color:${calPct>100?'var(--red)':'var(--gold)'};">${day.cal}</span>
        <span style="font-size:.85rem;color:var(--mt);"> / ${tgt.cal} kcal</span>
      </div>
      <div class="pb-wrap"><div class="pb" style="height:10px;"><div class="pb-f" style="width:${calPct}%;background:${calPct>100?'var(--red)':'var(--gold)'};"></div></div>
      <div class="pb-info">
        <span>${day.cal} أُكلت</span>
        <span>${Math.max(tgt.cal-day.cal,0)} متبقي</span>
      </div></div>
      <div class="cal-input-wrap">
        <input type="number" id="calIn" min="0" step="10" value="${day.cal}" placeholder="أدخل السعرات">
        <button class="btn-save" onclick="saveCal()">حفظ</button>
      </div>
      <div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;">
        <span class="badge bg">💪 بروتين ${tgt.pro}جم</span>
        <span class="badge bb">🌾 كارب ${tgt.carb}جم</span>
        <span class="badge ba">🥑 دهون ${tgt.fat}جم</span>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
//  RENDER: HISTORY
// ═══════════════════════════════════════════

function renderHist(){
  const s=getState();
  const days=s.days||{};
  const keys=Object.keys(days).sort().reverse();

  if(!keys.length){
    document.getElementById('p-hist').innerHTML=`<div class="empty">لا يوجد سجل بعد.<br>ابدأ بتسجيل يومك! 💪</div>`;
    return;
  }

  const streak=calcStreak(days);

  document.getElementById('p-hist').innerHTML = `
    <div class="streak-box">
      <div class="streak-num">${streak} 🔥</div>
      <div class="streak-label">أيام متواصلة (4+ مهام)</div>
    </div>

    <div class="sec-h">السجل اليومي</div>
    ${keys.map(k=>{
      const d=days[k];
      const done=Object.values(d.checks||{}).filter(Boolean).length;
      const tgt=getTargets(d.type);
      const pct=Math.round(done/CHECKS.length*100);
      return `
        <div class="hist-item">
          <div class="hist-head">
            <div class="hist-date">${fmtDate(k)}</div>
            <span class="hist-type ${d.type==='train'?'t':'r'}">${d.type==='train'?'🏋️ تمرين':'😴 راحة'}</span>
          </div>
          <div class="hist-dots">
            ${CHECKS.map(c=>`<div class="hdot ${d.checks&&d.checks[c.k]?'on':'off'}" title="${c.label}"></div>`).join('')}
          </div>
          <div class="hist-stats">
            <span>✅ ${done}/${CHECKS.length} (${pct}%)</span>
            <span>🔥 ${d.cal||0} kcal</span>
            <span>💧 ${d.water||0} كوب</span>
          </div>
          <div class="pb-wrap"><div class="pb" style="height:5px;"><div class="pb-f" style="width:${pct}%;background:${pct===100?'var(--gold)':pct>=50?'var(--green)':'var(--red)'};"></div></div></div>
        </div>
      `;
    }).join('')}
  `;
}

// ═══════════════════════════════════════════
//  RENDER: WEIGHT
// ═══════════════════════════════════════════

function renderWeight(){
  const s=getState();
  const weights=s.weights||{};
  const keys=Object.keys(weights).sort().reverse();
  const today=todayKey();

  // Progress
  const latestK=keys[0];
  const latestW=latestK?weights[latestK]:START_WEIGHT;
  const lost=START_WEIGHT-latestW;
  const pct=Math.min(Math.max(lost/(START_WEIGHT-GOAL_WEIGHT)*100,0),100);

  document.getElementById('p-weight').innerHTML=`
    <!-- Overall progress -->
    <div class="card" style="text-align:center;margin-bottom:12px;">
      <div class="ct">🎯 التقدم نحو 100 كجم</div>
      <div style="font-size:2rem;font-weight:900;color:var(--gold);">${latestW} كجم</div>
      <div style="font-size:.75rem;color:var(--mt);margin:4px 0 10px;">متبقي ${Math.max(latestW-GOAL_WEIGHT,0).toFixed(1)} كجم</div>
      <div class="pb"><div class="pb-f" style="width:${pct}%;background:linear-gradient(90deg,var(--green),var(--gold));height:12px;border-radius:8px;"></div></div>
      <div class="pb-info"><span>121 كجم</span><span>${pct.toFixed(0)}%</span><span>100 كجم 🎯</span></div>
    </div>

    <!-- Add weight -->
    <div class="card">
      <div class="ct">➕ تسجيل وزن جديد</div>
      <div class="al al-i"><span>💡</span><div>قيّس كل ثلاثاء الصبح بعد الصحيان قبل الأكل.</div></div>
      <div class="mrow" style="margin-bottom:8px;">
        <div class="mfield">
          <label>📅 التاريخ</label>
          <input type="text" id="wDate" value="${today}" placeholder="YYYY-MM-DD">
        </div>
        <div class="mfield">
          <label>⚖️ الوزن (كجم)</label>
          <input type="number" id="wVal" step="0.1" min="80" max="130" placeholder="مثال: 118.5">
        </div>
      </div>
      <button class="btn btn-g" onclick="addWeight()">✅ حفظ الوزن</button>
    </div>

    <!-- Log -->
    <div class="sec-h">سجل الأوزان</div>
    ${!keys.length?`<div class="empty">لم تسجّل أي وزن بعد</div>`:
      keys.map((k,i)=>{
        const val=weights[k];
        const prev=weights[keys[i+1]];
        let diffEl='';
        if(prev!==undefined){
          const d=(val-prev).toFixed(1);
          const cls=d<0?'down':d>0?'up':'same';
          const lbl=d<0?`▼ ${Math.abs(d)} كجم`:d>0?`▲ ${d} كجم`:'= ثابت';
          diffEl=`<div class="wl-diff ${cls}">${lbl}</div>`;
        }
        return `
          <div class="wl-item">
            <div>
              <div class="wl-date">${fmtDate(k)}</div>
              ${diffEl}
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="wl-val">${val}</div>
              <button onclick="delWeight('${k}')" style="background:none;border:none;color:var(--red);font-size:1.1rem;cursor:pointer;">🗑</button>
            </div>
          </div>
        `;
      }).join('')
    }
  `;
}

// ═══════════════════════════════════════════
//  RENDER: WORKOUT
// ═══════════════════════════════════════════

function renderWorkout(){
  const s=getState();
  if(!s.workouts) s.workouts={};

  // Current week key (Monday-based)
  const n=new Date();
  const diff=n.getDate()-n.getDay()+(n.getDay()===0?-6:1);
  const mon=new Date(n); mon.setDate(diff);
  const wk=mon.toISOString().split('T')[0];

  const prevMon=new Date(mon); prevMon.setDate(prevMon.getDate()-7);
  const pwk=prevMon.toISOString().split('T')[0];

  const cur=s.workouts[wk]||{};
  const prev=s.workouts[pwk]||{};

  document.getElementById('p-workout').innerHTML=`
    <div class="al al-w"><span>⚠️</span><div class="sm">راحة 90 ثانية بين السيتات. نبض مثالي أثناء الكارديو: 120-135 نبضة/دق.</div></div>
    <div class="sec-h">أسبوع ${fmtDateShort(wk)} — سجّل الأوزان</div>

    ${Object.entries(EX_PLAN).map(([day,plan])=>`
      <div class="card ex-day">
        <div class="ct">${plan.label}</div>
        ${plan.items.map(ex=>{
          const key=`${day}_${ex.n.replace(/\s/g,'_')}`;
          const curVal=cur[key]||'';
          const prevVal=prev[key]||'';
          return `
            <div class="ex-row">
              <span class="ex-sets">${ex.s}</span>
              <span class="ex-name">${ex.n}</span>
              ${ex.s.includes('×')?`
                <input class="ex-kg" type="number" min="0" step="2.5"
                  value="${curVal}" placeholder="${prevVal||'كجم'}"
                  oninput="logEx('${wk}','${key}',this.value)">
                <span class="ex-prev">${prevVal||'—'}</span>
              `:'<span style="font-size:.65rem;color:var(--mt);">⏱</span><span class="ex-prev"></span>'}
            </div>
          `;
        }).join('')}
      </div>
    `).join('')}

    <div class="al al-i"><span>💡</span><div class="sm">الأرقام الرمادية = أوزان الأسبوع اللي فات. لو الأوزان بترتفع = تقدم حقيقي.</div></div>
  `;
}

// ═══════════════════════════════════════════
//  RENDER: MEASURES
// ═══════════════════════════════════════════

function renderMeasures(){
  const s=getState();
  const measures=s.measures||[];
  const today=todayKey();

  document.getElementById('p-measure').innerHTML=`
    <div class="al al-i"><span>📏</span><div>قيّس كل أسبوعين الصبح. الخصر أهم من الوزن في حالتك.</div></div>

    <div class="card">
      <div class="ct">➕ قياس جديد</div>
      <div class="mfield" style="margin-bottom:10px;">
        <label>📅 التاريخ</label>
        <input type="text" id="mDate" value="${today}" placeholder="YYYY-MM-DD">
      </div>
      <div class="mrow">
        <div class="mfield"><label>⚖️ الوزن (كجم)</label><input type="number" id="mWt" step="0.1" placeholder="مثال: 118"></div>
        <div class="mfield"><label>🎯 الخصر (سم)</label><input type="number" id="mWaist" step="0.5" placeholder="مثال: 115"></div>
      </div>
      <div class="mrow">
        <div class="mfield"><label>🍑 الأرداف (سم)</label><input type="number" id="mHips" step="0.5" placeholder="مثال: 120"></div>
        <div class="mfield"><label>💪 الذراع (سم)</label><input type="number" id="mArm" step="0.5" placeholder="مثال: 42"></div>
      </div>
      <div class="mfield" style="margin-bottom:10px;">
        <label>🦒 الرقبة (سم)</label>
        <input type="number" id="mNeck" step="0.5" placeholder="مثال: 40">
      </div>
      <button class="btn btn-g" onclick="addMeasure()">✅ حفظ القياس</button>
    </div>

    ${!measures.length?`<div class="empty">لم تسجّل أي قياسات بعد</div>`:`
      <div class="sec-h">سجل المقاسات</div>
      ${[...measures].reverse().map((m,ri)=>{
        const i=measures.length-1-ri;
        const prev=measures[i-1];
        function d(f){ if(!prev||!prev[f]||!m[f]) return ''; const v=(parseFloat(m[f])-parseFloat(prev[f])).toFixed(1); const g=parseFloat(v)<0; return `<span style="color:${g?'var(--green)':'var(--red)'};font-size:.65rem;"> (${v>0?'+':''}${v})</span>`; }
        return `
          <div class="hist-item">
            <div class="hist-head">
              <div class="hist-date" style="font-size:.75rem;">${fmtDate(m.date)}</div>
              <button onclick="delMeasure(${i})" style="background:none;border:none;color:var(--red);font-size:1rem;cursor:pointer;">🗑</button>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:.75rem;">
              ${m.weight?`<span class="badge ba">⚖️ ${m.weight}كجم${d('weight')}</span>`:''}
              ${m.waist?`<span class="badge bb">🎯 خصر ${m.waist}${d('waist')}</span>`:''}
              ${m.hips?`<span class="badge bg">🍑 أرداف ${m.hips}${d('hips')}</span>`:''}
              ${m.arm?`<span class="badge" style="background:rgba(176,132,245,.12);color:var(--purple);">💪 ذراع ${m.arm}${d('arm')}</span>`:''}
              ${m.neck?`<span class="badge" style="background:rgba(78,205,196,.12);color:var(--teal);">🦒 رقبة ${m.neck}${d('neck')}</span>`:''}
            </div>
          </div>
        `;
      }).join('')}

      ${measures.length>=2?(()=>{
        const f=measures[0],l=measures[measures.length-1];
        const dw=l.weight&&f.weight?(l.weight-f.weight).toFixed(1):null;
        const dwa=l.waist&&f.waist?(l.waist-f.waist).toFixed(1):null;
        return `
          <div class="al al-s">
            <span>📈</span>
            <div class="sm">
              <div class="bold" style="margin-bottom:5px;">التغيير الإجمالي منذ البداية:</div>
              ${dw?`<div>⚖️ وزن: <span style="color:${dw<0?'var(--green)':'var(--red)'};">${dw} كجم</span></div>`:''}
              ${dwa?`<div>🎯 خصر: <span style="color:${dwa<0?'var(--green)':'var(--red)'};">${dwa} سم</span></div>`:''}
            </div>
          </div>
        `;
      })():''}
    `}
  `;
}

// ═══════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════

function toggleCheck(key){
  const s=getState(); const k=todayKey();
  const day=ensureDay(s,k);
  day.checks[key]=!day.checks[key];
  setState(s); renderToday();
}

function setType(t){
  const s=getState(); const k=todayKey();
  const day=ensureDay(s,k);
  day.type=t;
  setState(s); renderToday();
}

function setCup(n){
  const s=getState(); const k=todayKey();
  const day=ensureDay(s,k);
  day.water=day.water===n?n-1:n;
  setState(s); renderToday();
}

function saveCal(){
  const v=parseInt(document.getElementById('calIn')?.value||0);
  const s=getState(); const k=todayKey();
  const day=ensureDay(s,k);
  day.cal=v;
  setState(s); renderToday();
}

function addWeight(){
  const date=document.getElementById('wDate')?.value?.trim();
  const val=parseFloat(document.getElementById('wVal')?.value);
  if(!date||isNaN(val)){alert('أدخل التاريخ والوزن');return;}
  const s=getState();
  if(!s.weights) s.weights={};
  s.weights[date]=val;
  setState(s); renderWeight();
}

function delWeight(k){
  if(!confirm('هتحذف الوزن ده؟')) return;
  const s=getState();
  delete s.weights[k];
  setState(s); renderWeight();
}

function logEx(wk,key,val){
  const s=getState();
  if(!s.workouts) s.workouts={};
  if(!s.workouts[wk]) s.workouts[wk]={};
  s.workouts[wk][key]=val;
  setState(s);
}

function addMeasure(){
  const m={
    date: document.getElementById('mDate')?.value?.trim()||todayKey(),
    weight: document.getElementById('mWt')?.value,
    waist:  document.getElementById('mWaist')?.value,
    hips:   document.getElementById('mHips')?.value,
    arm:    document.getElementById('mArm')?.value,
    neck:   document.getElementById('mNeck')?.value,
  };
  if(!m.waist&&!m.weight){alert('أدخل قياساً واحداً على الأقل');return;}
  const s=getState();
  if(!s.measures) s.measures=[];
  s.measures.push(m);
  s.measures.sort((a,b)=>a.date.localeCompare(b.date));
  setState(s); renderMeasures();
}

function delMeasure(i){
  if(!confirm('هتحذف القياس ده؟')) return;
  const s=getState();
  s.measures.splice(i,1);
  setState(s); renderMeasures();
}

// ═══════════════════════════════════════════
//  RENDER ROUTER
// ═══════════════════════════════════════════

function render(){
  const map={today:renderToday,hist:renderHist,weight:renderWeight,workout:renderWorkout,measure:renderMeasures};
  if(map[currentPanel]) map[currentPanel]();
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════

// Update top date
const days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const n=new Date();
document.getElementById('topDate').textContent=
  days[n.getDay()]+' '+n.toLocaleDateString('ar-EG',{day:'numeric',month:'long',year:'numeric'});

// Auto-update timer every minute
setInterval(()=>{ if(currentPanel==='today') renderToday(); },60000);

// Initial render
render();
</script>
